# Conda environment for trend-pipeline development AND end-user installs.
#
# Single-shot setup on Linux / macOS / WSL2:
#     conda env create -f environment.yml
#     conda activate trend
#     pip install -e ./pipeline   # editable install of the trend CLI
#
# Note on version pinning:
#   The manuscript SBATCH used bowtie2 2.3.4.3 and R 3.5.1. Those exact
#   versions cannot coexist with a modern Python conda env (bowtie2 2.3.4.3
#   only supports Python <=3.7; cutadapt 5.x requires Python 3.13+; the
#   conda solver finds these constraints unsatisfiable). We relax pins to
#   compatible modern versions:
#     - bowtie2 2.5+ produces equivalent alignment for short-barcode reads
#     - R 4.2+ executes the manuscript's tidyverse-based Step-9 script with
#       no behavioral change for this analysis
#   Each run's manifest.json records the exact tool versions used, so any
#   numerical drift between this env and the manuscript run is auditable.

name: trend
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # Python runtime — pinned to 3.11 (sweet spot: all bioinformatics tools have
  # compatible builds; avoids cutadapt 5.x trying to pull Python 3.13+).
  - python=3.11
  - pip

  # Workflow + Python data stack
  - pyyaml
  - pandas
  - numpy
  - duckdb
  - snakemake-minimal>=7.32

  # Pipeline binaries (Steps 1-8). Latest stable versions from bioconda.
  - bowtie2
  - samtools
  - cutadapt
  - fastx_toolkit

  # R + R packages (Steps 8 and 9)
  - r-base>=4.2
  - r-tidyverse
  - r-gridextra
  - r-data.table
  - bioconductor-rsamtools

  # Python utilities used by Steps 1-3
  - biopython
  - openpyxl

  # Dashboard runtime
  - fastapi
  - uvicorn
  - sse-starlette
  - pydantic
  - httpx
