# TREND sample sheet — ovarian cancer template.
#
# This file is the source of truth for the pipeline. The runner reads it to
# find your samples, render the Step-9 R script for your experimental design,
# and apply your DNA-coverage thresholds. Edit the entries below to match
# your own data.
#
# Each `samples:` row is one experimental sample = one (cell_line, replicate)
# pair. Every pair has a DNA FASTQ (input plasmid pool, used for normalization)
# and an RNA FASTQ (cellular readout). The `dna_fastq` and `rna_fastq` values
# MUST match your filenames in the --inputs directory, without the
# `.fastq.gz` extension.
#
# `dna_threshold` filters low-coverage barcodes by their DNA-side count. Pick
# it after looking at DNA_threshold_for_samples.pdf from your first run; if
# omitted the runner uses 3 and stamps a THRESHOLDS_DEFAULT marker so you
# remember to come back and tune.
#
# The published OvCa values below are kept as a reference example. Replace
# them with your own.

project: ovarian_cancer

samples:
  # ------------------ OV8 (ovarian cancer; tumor) ------------------
  - { cell_line: OV8,  replicate: 1, dna_fastq: OV8_Lib4_DNA_r1,  rna_fastq: OV8_Lib4_RNA_r1,  dna_threshold: 2 }
  - { cell_line: OV8,  replicate: 2, dna_fastq: OV8_Lib4_DNA_r2,  rna_fastq: OV8_Lib4_RNA_r2,  dna_threshold: 3 }
  - { cell_line: OV8,  replicate: 3, dna_fastq: OV8_Lib4_DNA_r3,  rna_fastq: OV8_Lib4_RNA_r3,  dna_threshold: 5 }

  # ----------------- IOSE (immortalized normal ovarian; control) -------------------
  - { cell_line: IOSE, replicate: 1, dna_fastq: IOSE_Lib4_DNA_r1, rna_fastq: IOSE_Lib4_RNA_r1, dna_threshold: 6 }
  - { cell_line: IOSE, replicate: 2, dna_fastq: IOSE_Lib4_DNA_r2, rna_fastq: IOSE_Lib4_RNA_r2, dna_threshold: 3 }
  - { cell_line: IOSE, replicate: 3, dna_fastq: IOSE_Lib4_DNA_r3, rna_fastq: IOSE_Lib4_RNA_r3, dna_threshold: 2 }

  # ----------------- ID8 (mouse ovarian cancer; tumor) --------------
  - { cell_line: ID8,  replicate: 1, dna_fastq: ID8_Lib4_DNA_r1,  rna_fastq: ID8_Lib4_RNA_r1,  dna_threshold: 30 }
  - { cell_line: ID8,  replicate: 2, dna_fastq: ID8_Lib4_DNA_r2,  rna_fastq: ID8_Lib4_RNA_r2,  dna_threshold: 35 }

analysis:
  # Minimum supporting barcodes per promoter for inclusion in the activity table.
  # Higher = stricter / fewer promoters; lower = more promoters but noisier.
  # Published OvCa used 3.
  bc_threshold: 3

  # Which contrasts to compute. Each produces three output columns:
  #   mean_<experimental>_RD_ratio
  #   mean_<control>_RD_ratio
  #   mean_<experimental>_to_<control>_RD_ratio
  # The `experimental` and `control` values must match a `cell_line:` above.
  contrasts:
    - { name: OV8_vs_IOSE, experimental: OV8, control: IOSE }
    - { name: ID8_vs_IOSE, experimental: ID8, control: IOSE }
