name: T_cell_activation
display_name: T-cell activation-responsive enhancer screening
description: |
  Per-donor activity contrast between resting and stimulated primary human T cells (total CD4+CD8).
  Activation-induced enhancers identified per donor; reproducibility across
  donors is the primary readout.

step9_script: codes/3. Post_HPC_enhancer_activity_analysis_scripts/code_by_projects/T_cell_activation/T_cell_activation_responsive_enhancer_screening_analysis.R

outputs:
  - filename: activation_responsive_enhancer_screening_result_donor1.csv
    description: Per-promoter activity in donor 1 (rest, stim, fold change, supporting barcodes).
  - filename: activation_responsive_enhancer_screening_result_donor2.csv
    description: Per-promoter activity in donor 2.
  - filename: selected_T_cell_activation_inducible_enhancers_for_synthesis.xlsx
    description: Curated subset of inducible enhancers prioritized for downstream synthesis.
